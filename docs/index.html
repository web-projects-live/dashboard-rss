<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Hub</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --surface-color: #1a1a1a;
            --surface-light: #2a2a2a;
            --text-main: #ffffff;
            --text-muted: #888888;
            --accent: #4dabf7;
            --accent-success: #40c057;
            --alert: #fa5252;
            --radius: 24px;
            --pokemon: #ffcc00;
            --brawlstars: #ff6b35;
            --ai: #4dabf7;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            width: 1080px;
            height: 1920px;
            overflow: hidden;
            position: relative;
        }

        #app-container {
            display: flex;
            width: 3240px; /* Three screens wide */
            height: 1920px;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .view {
            width: 1080px;
            height: 1920px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        /* Shared */
        .card { background: var(--surface-color); border-radius: var(--radius); padding: 40px; display: flex; flex-direction: column; }
        .section-title { font-size: 2rem; color: var(--text-muted); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        input, select, button { font-size: 1.8rem; padding: 20px; border-radius: 12px; border: none; outline: none; margin-bottom: 15px; width: 100%; }
        input, select { background: var(--surface-light); color: white; }
        button { background: var(--accent); color: black; font-weight: bold; cursor: pointer; }
        button:active { opacity: 0.8; }
        .nav-hint { font-size: 1.8rem; color: var(--text-muted); text-align: center; padding: 20px; cursor: pointer; }

        /* Dashboard */
        .pulse { flex-direction: row; justify-content: space-between; align-items: center; }
        .clock { font-size: 8rem; font-weight: 700; line-height: 1; }
        .date { font-size: 2.5rem; color: var(--accent); }
        .weather { font-size: 3rem; text-align: right; }
        .chips { display: flex; gap: 15px; margin-top: 15px; justify-content: flex-end; }
        .chip { background: var(--surface-light); padding: 10px 25px; border-radius: 50px; font-size: 1.5rem; color: var(--text-muted); }
        .chip.home { background: var(--accent-success); color: black; font-weight: bold; }
        .agenda-card { flex: 1; overflow: hidden; }
        .agenda-day { margin-bottom: 30px; }
        .day-header { font-size: 2.2rem; font-weight: bold; color: var(--accent); border-bottom: 2px solid var(--surface-light); padding-bottom: 10px; margin-bottom: 15px; }
        .event { display: flex; justify-content: space-between; font-size: 2rem; padding: 10px 0; }
        .event-time { color: var(--text-muted); min-width: 150px; }
        .feeds { display: flex; gap: 30px; }
        .feed-card { flex: 1; font-size: 1.8rem; line-height: 1.5; font-style: italic; }
        .feed-title { font-size: 1.5rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 10px; font-style: normal; }

        /* Control */
        .control-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .control-btn { height: 120px; background: var(--surface-light); color: white; display: flex; align-items: center; justify-content: center; font-size: 2rem; border-radius: var(--radius); cursor: pointer; }
        .lists-container { display: flex; gap: 30px; flex: 1; }
        .list-col { flex: 1; display: flex; flex-direction: column; }
        .todo-item { display: flex; justify-content: space-between; background: var(--surface-light); padding: 20px; border-radius: 12px; margin-bottom: 10px; font-size: 1.8rem; }
        .todo-item.done { text-decoration: line-through; opacity: 0.5; }

        /* News View */
        .news-tabs { display: flex; gap: 15px; flex-shrink: 0; }
        .news-tab {
            flex: 1; padding: 22px 10px; background: var(--surface-color); color: var(--text-muted);
            border: 2px solid transparent; border-radius: 16px; font-size: 1.55rem; font-weight: bold;
            cursor: pointer; transition: all 0.2s; width: auto; margin-bottom: 0;
        }
        .news-tab.active { background: var(--surface-light); color: white; border-color: var(--accent); }
        .news-tab[data-cat="pokemon"].active { border-color: var(--pokemon); color: var(--pokemon); }
        .news-tab[data-cat="brawlstars"].active { border-color: var(--brawlstars); color: var(--brawlstars); }
        .news-tab[data-cat="ai"].active { border-color: var(--ai); color: var(--ai); }

        .news-hero { flex-shrink: 0; padding: 35px; gap: 0; }
        .hero-body { flex: 1; }
        .hero-cat-row { display: flex; align-items: center; gap: 15px; margin-bottom: 18px; }
        .cat-badge {
            display: inline-block; padding: 6px 16px; border-radius: 50px;
            font-size: 1.3rem; font-weight: bold; letter-spacing: 1px; text-transform: uppercase;
        }
        .cat-pokemon  { background: rgba(255,204,0,0.15); color: var(--pokemon); }
        .cat-brawlstars { background: rgba(255,107,53,0.15); color: var(--brawlstars); }
        .cat-ai { background: rgba(77,171,247,0.15); color: var(--ai); }
        .hero-source { font-size: 1.5rem; color: var(--text-muted); }
        .hero-title { font-size: 2.8rem; font-weight: 700; line-height: 1.3; margin-bottom: 18px; }
        .hero-summary {
            font-size: 1.8rem; color: var(--text-muted); line-height: 1.6; margin-bottom: 18px;
            display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
        }
        .hero-meta { font-size: 1.5rem; color: var(--text-muted); margin-bottom: 20px; }
        .hero-link { color: var(--accent); text-decoration: none; font-size: 1.8rem; font-weight: bold; }
        .hero-link:active { opacity: 0.7; }
        .hero-controls {
            display: flex; align-items: center; justify-content: space-between;
            margin-top: 25px; padding-top: 20px; border-top: 1px solid var(--surface-light);
            flex-shrink: 0;
        }
        .hero-nav-btn {
            background: var(--surface-light); color: white; border: none; border-radius: 12px;
            padding: 18px 35px; font-size: 1.8rem; cursor: pointer; width: auto; margin-bottom: 0;
        }
        .hero-nav-btn:active { background: var(--accent); color: black; }
        .hero-counter { font-size: 1.6rem; color: var(--text-muted); }

        .news-list-card { flex: 1; overflow: hidden; padding: 25px 30px; }
        .news-list-scroll { height: 100%; overflow-y: auto; padding-right: 5px; }
        .news-list-scroll::-webkit-scrollbar { width: 6px; }
        .news-list-scroll::-webkit-scrollbar-track { background: transparent; }
        .news-list-scroll::-webkit-scrollbar-thumb { background: var(--surface-light); border-radius: 3px; }

        .news-item {
            display: block; text-decoration: none; color: var(--text-main);
            background: var(--surface-light); border-radius: 16px;
            padding: 25px; margin-bottom: 15px; transition: opacity 0.15s;
        }
        .news-item:active { opacity: 0.6; }
        .news-item-title { font-size: 1.9rem; font-weight: 600; line-height: 1.3; margin-bottom: 12px; }
        .news-item-meta { font-size: 1.4rem; color: var(--text-muted); display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

        .news-status { font-size: 1.4rem; color: var(--text-muted); text-align: center; flex-shrink: 0; }
    </style>
</head>
<body>

<div id="app-container">

    <!-- ═══════════════════════════════════════════ -->
    <!-- VIEW 1: DASHBOARD                           -->
    <!-- ═══════════════════════════════════════════ -->
    <div class="view" id="view-dashboard">

        <div class="card pulse">
            <div>
                <div id="time" class="clock">--:--</div>
                <div id="date" class="date">Loading...</div>
            </div>
            <div>
                <div id="weather" class="weather">--° / --</div>
                <div class="chips">
                    <div class="chip" id="presence-joel">Joel</div>
                    <div class="chip" id="presence-kayla">Kayla</div>
                </div>
            </div>
        </div>

        <div class="card agenda-card">
            <div class="section-title">Upcoming Schedule</div>
            <div id="agenda-content">Loading agenda...</div>
        </div>

        <div class="feeds">
            <div class="card feed-card">
                <div class="feed-title">Verse of the Day</div>
                <div id="bible-feed">Loading...</div>
            </div>
            <div class="card feed-card">
                <div class="feed-title">Daily Laugh</div>
                <div id="joke-feed">Loading...</div>
            </div>
        </div>

        <div class="nav-hint" onclick="switchView('control')">Controls &rarr;</div>
    </div>

    <!-- ═══════════════════════════════════════════ -->
    <!-- VIEW 2: CONTROLS                            -->
    <!-- ═══════════════════════════════════════════ -->
    <div class="view" id="view-control">

        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div class="nav-hint" style="padding-left:0" onclick="switchView('dashboard')">&larr; Dashboard</div>
            <div class="nav-hint" style="padding-right:0" onclick="switchView('news')">News &rarr;</div>
        </div>

        <div class="card">
            <div class="section-title">Quick Controls</div>
            <div class="control-grid">
                <div class="control-btn" onclick="callService('light','toggle',{entity_id:'light.all_lights'})">💡 Lights</div>
                <div class="control-btn" onclick="callService('lock','lock',{entity_id:'lock.front_door'})">🔒 Lock</div>
                <div class="control-btn" onclick="callService('cover','toggle',{entity_id:'cover.garage_door'})">🚗 Garage</div>
            </div>
        </div>

        <div class="lists-container">
            <div class="card list-col">
                <div class="section-title">Family Tasks</div>
                <div id="todo-list" style="flex:1; overflow-y:auto; margin-bottom:20px;"></div>
                <div>
                    <input type="text" id="new-task" placeholder="New Task...">
                    <button onclick="addTask()">Add Task</button>
                </div>
            </div>

            <div class="card list-col">
                <div class="section-title">Add Event</div>
                <div style="flex:1;">
                    <input type="text" id="event-summary" placeholder="Event Title">
                    <input type="date" id="event-date">
                    <input type="time" id="event-time">
                    <button onclick="addEvent()">Save to Calendar</button>
                    <p id="event-status" style="font-size:1.5rem; color:var(--accent); margin-top:15px; text-align:center;"></p>
                </div>
            </div>
        </div>

    </div>

    <!-- ═══════════════════════════════════════════ -->
    <!-- VIEW 3: NEWS FEED                           -->
    <!-- ═══════════════════════════════════════════ -->
    <div class="view" id="view-news">

        <div class="nav-hint" onclick="switchView('control')">&larr; Controls</div>

        <!-- Category filter tabs -->
        <div class="news-tabs">
            <button class="news-tab active" data-cat="all"        onclick="filterNews('all')">All</button>
            <button class="news-tab"        data-cat="pokemon"    onclick="filterNews('pokemon')">⚡ Pokémon</button>
            <button class="news-tab"        data-cat="brawlstars" onclick="filterNews('brawlstars')">🏆 Brawl</button>
            <button class="news-tab"        data-cat="ai"         onclick="filterNews('ai')">🤖 AI</button>
        </div>

        <!-- Rotating hero card -->
        <div class="card news-hero">
            <div class="hero-body" id="hero-content">
                <div style="color:var(--text-muted);font-size:1.8rem;">Loading feed...</div>
            </div>
            <div class="hero-controls">
                <button class="hero-nav-btn" onclick="changeHero(-1)">&#8592; Prev</button>
                <span class="hero-counter" id="hero-counter"></span>
                <button class="hero-nav-btn" onclick="changeHero(1)">Next &#8594;</button>
            </div>
        </div>

        <!-- Scrollable list of remaining items -->
        <div class="card news-list-card">
            <div class="news-list-scroll" id="news-list"></div>
        </div>

        <div class="news-status" id="news-status">Loading...</div>

    </div>
</div>

<script>
    // ─── CONFIGURATION ──────────────────────────────────────────
    const HA_URL        = 'http://192.168.1.129:8123/api';
    const TOKEN         = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiI5NzE2OGQ0YWRhMzQ0NGM1YmNhODljNzllYjU5ZGMwZSIsImlhdCI6MTc4MDUzNzk2MCwiZXhwIjoyMDk1ODk3OTYwfQ.4e1kLNqMtb2g4B2ajPldejCEBoitVHnPB_xWrM3oWoo';
    const CALENDAR_ENTITY = 'calendar.family';
    const TODO_ENTITY     = 'todo.family_to_dos';

    const FEED_URL        = 'https://web-projects-live.github.io/dashboard-rss/feed.xml';
    const HERO_ROTATE_MS  = 60 * 60 * 1000;   // rotate hero every 1 hour
    const FEED_REFRESH_MS = 30 * 60 * 1000;   // re-fetch feed every 30 min
    const HA_REFRESH_MS   = 30 * 1000;        // re-poll HA every 30 sec

    // ─── SWIPE / VIEW SWITCHING ─────────────────────────────────
    const appContainer = document.getElementById('app-container');
    const VIEW_ORDER   = ['dashboard', 'control', 'news'];
    let currentView    = 'dashboard';
    let touchStartX    = 0;

    function switchView(view) {
        currentView = view;
        const idx   = VIEW_ORDER.indexOf(view);
        appContainer.style.transform = `translateX(${-1080 * idx}px)`;
    }

    window.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; });
    window.addEventListener('touchend', e => {
        const dx  = touchStartX - e.changedTouches[0].screenX;
        const idx = VIEW_ORDER.indexOf(currentView);
        if (dx >  100 && idx < VIEW_ORDER.length - 1) switchView(VIEW_ORDER[idx + 1]);
        if (dx < -100 && idx > 0)                      switchView(VIEW_ORDER[idx - 1]);
    });

    // ─── CLOCK ──────────────────────────────────────────────────
    function updateClock() {
        const now = new Date();
        document.getElementById('time').innerText = now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
        document.getElementById('date').innerText = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
    }
    setInterval(updateClock, 1000);
    updateClock();

    // ─── HOME ASSISTANT API ─────────────────────────────────────
    async function fetchHA(endpoint, method = 'GET', body = null) {
        const options = {
            method,
            headers: { 'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json' }
        };
        if (body) options.body = JSON.stringify(body);
        try {
            const res = await fetch(`${HA_URL}${endpoint}`, options);
            return await res.json();
        } catch (err) { console.error('HA API Error:', err); return null; }
    }

    async function callService(domain, service, serviceData) {
        await fetchHA(`/services/${domain}/${service}`, 'POST', serviceData);
        refreshHAData();
    }

    // ─── CALENDAR ───────────────────────────────────────────────
    async function loadCalendar() {
        const start  = new Date().toISOString();
        const end    = new Date(Date.now() + 30 * 24 * 60 * 60 * 1000).toISOString();
        const events = await fetchHA(`/calendars/${CALENDAR_ENTITY}?start=${start}&end=${end}`);
        if (!events || !Array.isArray(events)) return;

        const daysMap = {};
        events.forEach(evt => {
            const dateObj = new Date(evt.start?.dateTime || evt.start?.date);
            const dayStr  = dateObj.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
            if (!daysMap[dayStr]) daysMap[dayStr] = [];
            daysMap[dayStr].push({
                title: evt.summary,
                time: evt.start?.dateTime
                    ? dateObj.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })
                    : 'All Day'
            });
        });

        const sortedDays = Object.keys(daysMap)
            .sort((a, b) => new Date(a) - new Date(b))
            .slice(0, 7);

        let html = '';
        sortedDays.forEach(day => {
            html += `<div class="agenda-day"><div class="day-header">${day}</div>`;
            daysMap[day].forEach(evt => {
                html += `<div class="event"><span class="event-time">${evt.time}</span><span>${evt.title}</span></div>`;
            });
            html += `</div>`;
        });
        document.getElementById('agenda-content').innerHTML = html || 'No upcoming events.';
    }

    async function addEvent() {
        const summary = document.getElementById('event-summary').value;
        const date    = document.getElementById('event-date').value;
        const time    = document.getElementById('event-time').value;
        const status  = document.getElementById('event-status');
        if (!summary || !date) { status.innerText = 'Title and Date required!'; return; }

        const payload = { entity_id: CALENDAR_ENTITY, summary };
        if (time) {
            payload.start_date_time = `${date} ${time}:00`;
            const end = new Date(new Date(`${date}T${time}:00`).getTime() + 3600000);
            payload.end_date_time   = end.toISOString().replace('T', ' ').substring(0, 19);
        } else {
            payload.start_date = date;
            const end = new Date(new Date(date).getTime() + 86400000);
            payload.end_date   = end.toISOString().split('T')[0];
        }

        await callService('calendar', 'create_event', payload);
        document.getElementById('event-summary').value = '';
        status.innerText = 'Added!';
        setTimeout(() => status.innerText = '', 3000);
        loadCalendar();
    }

    // ─── TO-DO ──────────────────────────────────────────────────
    async function loadTodos() {
        const res = await fetchHA('/services/todo/get_items', 'POST', { entity_id: TODO_ENTITY, status: 'needs_action' });
        if (!res || !res[TODO_ENTITY]) return;
        const items = res[TODO_ENTITY].items || [];
        let html = '';
        items.forEach(item => {
            html += `<div class="todo-item" onclick="completeTask('${item.uid}')">
                        <span>${item.summary}</span>
                        <span style="color:var(--text-muted)">○</span>
                     </div>`;
        });
        document.getElementById('todo-list').innerHTML = html || '<p style="color:var(--text-muted)">All caught up!</p>';
    }

    async function addTask() {
        const input = document.getElementById('new-task');
        if (!input.value) return;
        await callService('todo', 'add_item', { entity_id: TODO_ENTITY, item: input.value });
        input.value = '';
        loadTodos();
    }

    async function completeTask(uid) {
        await callService('todo', 'update_item', { entity_id: TODO_ENTITY, item: uid, status: 'completed' });
        loadTodos();
    }

    // ─── HA PULSE / FEEDS ───────────────────────────────────────
    async function loadHAPulseAndFeeds() {
        const weather = await fetchHA('/states/weather.home');
        if (weather?.attributes) {
            document.getElementById('weather').innerText = `${weather.attributes.temperature}° ${weather.state}`;
        }

        for (const name of ['joel', 'kayla']) {
            const person = await fetchHA(`/states/person.${name}`);
            if (person) {
                const chip = document.getElementById(`presence-${name}`);
                person.state === 'home' ? chip.classList.add('home') : chip.classList.remove('home');
            }
        }

        const scripture = await fetchHA('/states/sensor.scripture_display');
        if (scripture) document.getElementById('bible-feed').innerText = scripture.state;

        const joke = await fetchHA('/states/sensor.joke_display');
        if (joke) document.getElementById('joke-feed').innerText = joke.state;
    }

    function refreshHAData() {
        loadHAPulseAndFeeds();
        loadCalendar();
        loadTodos();
    }

    // ─── NEWS FEED ──────────────────────────────────────────────
    let allNewsItems    = [];
    let filteredItems   = [];
    let heroIndex       = 0;
    let currentCat      = 'all';
    let heroTimer       = null;
    let lastFeedUpdate  = null;

    function timeAgo(date) {
        const s = Math.floor((Date.now() - date) / 1000);
        if (s < 60)    return 'just now';
        if (s < 3600)  return `${Math.floor(s / 60)}m ago`;
        if (s < 86400) return `${Math.floor(s / 3600)}h ago`;
        return `${Math.floor(s / 86400)}d ago`;
    }

    function catBadge(cat) {
        const labels = { pokemon: '⚡ Pokémon', brawlstars: '🏆 Brawl Stars', ai: '🤖 AI' };
        return `<span class="cat-badge cat-${cat}">${labels[cat] || cat}</span>`;
    }

    async function loadNewsFeed() {
        try {
            const res  = await fetch(`${FEED_URL}?t=${Date.now()}`);
            const text = await res.text();
            const xml  = new DOMParser().parseFromString(text, 'text/xml');

            allNewsItems = [...xml.querySelectorAll('entry')].map(e => ({
                title:     e.querySelector('title')?.textContent?.trim() || '(no title)',
                link:      e.querySelector('link')?.getAttribute('href') || '#',
                category:  e.querySelector('category')?.getAttribute('term') || 'ai',
                published: new Date(e.querySelector('published')?.textContent),
                summary:   e.querySelector('summary')?.textContent?.trim() || '',
                source:    e.querySelector('author name')?.textContent?.trim() || '',
            }));

            lastFeedUpdate = new Date();
            applyNewsFilter();
            updateNewsStatus();
        } catch (err) {
            console.error('Feed fetch error:', err);
            document.getElementById('hero-content').innerHTML =
                `<div style="color:var(--alert);font-size:1.8rem;">Failed to load feed. Will retry.</div>`;
        }
    }

    function applyNewsFilter() {
        filteredItems = currentCat === 'all'
            ? [...allNewsItems]
            : allNewsItems.filter(i => i.category === currentCat);
        heroIndex = 0;
        renderHero();
        renderNewsList();
    }

    function filterNews(cat) {
        currentCat = cat;
        document.querySelectorAll('.news-tab').forEach(t => {
            t.classList.toggle('active', t.dataset.cat === cat);
        });
        applyNewsFilter();
    }

    function renderHero() {
        const el      = document.getElementById('hero-content');
        const counter = document.getElementById('hero-counter');

        if (!filteredItems.length) {
            el.innerHTML      = `<div style="color:var(--text-muted);font-size:1.8rem;">No items in this category.</div>`;
            counter.innerText = '';
            return;
        }

        const item        = filteredItems[heroIndex];
        counter.innerText = `${heroIndex + 1} / ${filteredItems.length}`;

        el.innerHTML = `
            <div class="hero-cat-row">
                ${catBadge(item.category)}
                <span class="hero-source">${item.source}</span>
            </div>
            <div class="hero-title">${item.title}</div>
            ${item.summary ? `<div class="hero-summary">${item.summary}</div>` : ''}
            <div class="hero-meta">${timeAgo(item.published)}</div>
            <a class="hero-link" href="${item.link}" target="_blank">Read article &#8594;</a>
        `;
    }

    function renderNewsList() {
        const el = document.getElementById('news-list');

        const listItems = filteredItems.filter((_, i) => i !== heroIndex);
        if (!listItems.length) {
            el.innerHTML = `<div style="color:var(--text-muted);font-size:1.8rem;padding:15px;">No other items.</div>`;
            return;
        }

        el.innerHTML = listItems.map(item => `
            <a class="news-item" href="${item.link}" target="_blank">
                <div class="news-item-title">${item.title}</div>
                <div class="news-item-meta">
                    ${catBadge(item.category)}
                    <span>${item.source}</span>
                    <span>·</span>
                    <span>${timeAgo(item.published)}</span>
                </div>
            </a>
        `).join('');
    }

    function changeHero(dir) {
        if (!filteredItems.length) return;
        heroIndex = (heroIndex + dir + filteredItems.length) % filteredItems.length;
        renderHero();
        renderNewsList();
        resetHeroTimer();
    }

    function resetHeroTimer() {
        clearInterval(heroTimer);
        heroTimer = setInterval(() => changeHero(1), HERO_ROTATE_MS);
    }

    function updateNewsStatus() {
        const el = document.getElementById('news-status');
        el.innerText = lastFeedUpdate
            ? `Updated ${timeAgo(lastFeedUpdate)} · ${allNewsItems.length} articles`
            : 'Loading...';
    }

    // ─── INIT ────────────────────────────────────────────────────
    refreshHAData();
    setInterval(refreshHAData, HA_REFRESH_MS);

    loadNewsFeed();
    setInterval(loadNewsFeed, FEED_REFRESH_MS);
    setInterval(updateNewsStatus, 60000); // keep "X min ago" fresh
    resetHeroTimer();
</script>
</body>
</html>
